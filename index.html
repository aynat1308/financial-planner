<body>

  <!-- React -->

const { useState, useMemo, useEffect } = React;
const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Area, AreaChart, ComposedChart, BarChart, Bar, PieChart, Pie, Cell } = Recharts;
const { jsPDF } = window.jspdf;
const XLSX = window.XLSX;

// Note: These libraries will be imported via CDN in the HTML or need to be installed:
// npm install jspdf jspdf-autotable html2canvas xlsx

// LocalStorage key
const STORAGE_KEY = 'financial-planner-data';

// Load data from LocalStorage
const loadFromStorage = () => {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      return JSON.parse(saved);
    }
  } catch (error) {
    console.error('Error loading from localStorage:', error);
  }
  return null;
};

// Save data to LocalStorage
const saveToStorage = (data) => {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch (error) {
    console.error('Error saving to localStorage:', error);
  }
};

// Loan calculation helper functions
const calculateLoanPayment = (principal, annualRate, months) => {
  if (!principal || !months || months <= 0) return 0;
  if (!annualRate || annualRate === 0) return principal / months; // No interest
  
  const monthlyRate = annualRate / 100 / 12;
  const payment = principal * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
  return Math.round(payment);
};

const calculateLoanPrincipal = (payment, annualRate, months) => {
  if (!payment || !months || months <= 0) return 0;
  if (!annualRate || annualRate === 0) return payment * months; // No interest
  
  const monthlyRate = annualRate / 100 / 12;
  const principal = payment * (Math.pow(1 + monthlyRate, months) - 1) / (monthlyRate * Math.pow(1 + monthlyRate, months));
  return Math.round(principal);
};

function FinancialPlanner() {
  // Load saved data from localStorage
  const savedData = loadFromStorage();
  
  // Consistent color palette for assets
  const ASSET_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#06b6d4'];
  const getAssetColor = (assetId, assets) => {
    const idx = assets.findIndex(a => a.id === assetId);
    return ASSET_COLORS[idx % ASSET_COLORS.length];
  };

  const [initialParams, setInitialParams] = useState(savedData?.initialParams || {
    currentYear: 2026,
    currentLaborIncome: 20000, // Monthly net income
    laborIncomeGrowth: 0, // Default to 0% growth
    targetLaborIncome: 5000, // Monthly net income
  });
  
  const [manualFIYear, setManualFIYear] = useState(savedData?.manualFIYear ?? null); // null = auto-calculate, or specific year
  const [calculateFI, setCalculateFI] = useState(savedData?.calculateFI ?? false); // FI calculation toggle

  const [assets, setAssets] = useState(savedData?.assets || [
    { id: 1, name: 'Hishtalmut', balance: 500000, initialBalance: 500000, annualReturn: 7, taxRate: 0, accessible: true, withdrawalAge: 0, withdrawLimit: null },
    { id: 2, name: 'Gemel', balance: 200000, initialBalance: 200000, annualReturn: 7, taxRate: 0, accessible: true, withdrawalAge: 0, withdrawLimit: null },
    { id: 3, name: 'Investment Account', balance: 1500000, initialBalance: 1500000, annualReturn: 7, taxRate: 25, accessible: true, withdrawalAge: 0, withdrawLimit: null },
  ]);

  const [allowances, setAllowances] = useState(savedData?.allowances || [
    { id: 1001, name: 'Pension',       monthlyIncome: 8000, taxRate: 15, minAge: 67, maxAge: 120 },
    { id: 1002, name: 'Kitzbat Zikna', monthlyIncome: 3500, taxRate: 0,  minAge: 70, maxAge: 120 },
  ]);

  const addAllowance = () => {
    setAllowances(prev => [...prev, { id: Date.now(), name: 'New Allowance', monthlyIncome: 0, taxRate: 0, minAge: 65, maxAge: 120 }]);
  };
  const updateAllowance = (id, field, value) => {
    setAllowances(prev => prev.map(a => a.id === id ? { ...a, [field]: value } : a));
  };
  const deleteAllowance = (id) => {
    setAllowances(prev => prev.filter(a => a.id !== id));
  };

  // Salaries state (replacing single labor income)
  const [salaries, setSalaries] = useState(savedData?.salaries || [
    { id: 2001, name: 'Main Job', monthlyIncome: 20000, growthRate: 0, minAge: 0, maxAge: 120 },
  ]);

  const addSalary = () => {
    setSalaries(prev => [...prev, { id: Date.now(), name: 'New Salary', monthlyIncome: 0, growthRate: 0, minAge: 0, maxAge: 120 }]);
  };
  const updateSalary = (id, field, value) => {
    setSalaries(prev => prev.map(s => s.id === id ? { ...s, [field]: value } : s));
  };
  const deleteSalary = (id) => {
    setSalaries(prev => prev.filter(s => s.id !== id));
  };

  const [loans, setLoans] = useState(savedData?.loans || []);
  const addLoan = () => {
    setLoans(prev => [...prev, { id: Date.now(), name: 'New Loan', balance: 0, interestRate: 5, remainingMonths: 60, monthlyPayment: 0 }]);
  };
  const updateLoan = (id, field, value) => {
    setLoans(prev => prev.map(l => l.id === id ? { ...l, [field]: value } : l));
  };
  const deleteLoan = (id) => {
    setLoans(prev => prev.filter(l => l.id !== id));
  };

  const [mortgages, setMortgages] = useState(savedData?.mortgages || []);
  const addMortgage = () => {
    setMortgages(prev => [...prev, { id: Date.now(), name: 'New Mortgage', balance: 0, interestRate: 3, remainingMonths: 240, monthlyPayment: 0 }]);
  };
  const updateMortgage = (id, field, value) => {
    setMortgages(prev => prev.map(m => m.id === id ? { ...m, [field]: value } : m));
  };
  const deleteMortgage = (id) => {
    setMortgages(prev => prev.filter(m => m.id !== id));
  };

  const [baseExpenses, setBaseExpenses] = useState(savedData?.baseExpenses || [
    { id: 1,  category: 'Housing',         monthlyAmount: 7000, growthRate: 0, min: 0, max: 20000 },
    { id: 2,  category: 'Food & Groceries', monthlyAmount: 2000, growthRate: 0, min: 0, max: 10000 },
    { id: 3,  category: 'Bills',            monthlyAmount: 1000, growthRate: 0, min: 0, max: 10000 },
    { id: 4,  category: 'Eating out',       monthlyAmount: 1000, growthRate: 0, min: 0, max: 10000 },
    { id: 5,  category: 'Transportation',   monthlyAmount: 1200, growthRate: 0, min: 0, max: 10000 },
    { id: 6,  category: 'Healthcare',       monthlyAmount: 600,  growthRate: 0, min: 0, max: 10000 },
    { id: 7,  category: 'Entertainment',    monthlyAmount: 100,  growthRate: 0, min: 0, max: 5000  },
    { id: 8,  category: 'Vacations',        monthlyAmount: 1000, growthRate: 0, min: 0, max: 15000 },
    { id: 9,  category: 'Clothing',         monthlyAmount: 500,  growthRate: 0, min: 0, max: 5000  },
    { id: 10, category: 'Insurances',       monthlyAmount: 500,  growthRate: 0, min: 0, max: 10000 },
    { id: 11, category: 'Children',         monthlyAmount: 2000, growthRate: 0, min: 0, max: 15000 },
    { id: 12, category: 'Hobbies',          monthlyAmount: 600,  growthRate: 0, min: 0, max: 5000  },
    { id: 13, category: 'Gifts',            monthlyAmount: 400,  growthRate: 0, min: 0, max: 5000  },
  ]);

  const [yearlyExpenseOverrides, setYearlyExpenseOverrides] = useState(savedData?.yearlyExpenseOverrides || {});
  const [yearlyLaborIncomeOverrides, setYearlyLaborIncomeOverrides] = useState(savedData?.yearlyLaborIncomeOverrides || {});
  const [expandedYears, setExpandedYears] = useState(new Set());
  const [showParameters, setShowParameters] = useState(false);
  const [selectedYearsForExpenseEdit, setSelectedYearsForExpenseEdit] = useState([]);
  const [editingCategoryId, setEditingCategoryId] = useState(null);
  const [editingMinMaxId, setEditingMinMaxId] = useState(null);

  const [view, setView] = useState(null); // Always start with no view selected
  const [timeHorizon, setTimeHorizon] = useState(savedData?.timeHorizon ?? 60);
  const [targetFinalBalance, setTargetFinalBalance] = useState(savedData?.targetFinalBalance ?? 0);
  const [currentAge, setCurrentAge] = useState(savedData?.currentAge ?? 35);

  // Export popup state
  const [showExportPopup, setShowExportPopup] = useState(false);
  const [exportSelections, setExportSelections] = useState({
    expenses: true,
    incomes: true,
    assets: true,
    debts: true,
    dashboard: true,
  });
  const [exportFormat, setExportFormat] = useState('pdf'); // 'pdf' (HTML) or 'excel' (CSV)
  const [isExporting, setIsExporting] = useState(false);

  const toggleYearExpanded = (year) => {
    const newExpanded = new Set(expandedYears);
    if (newExpanded.has(year)) {
      newExpanded.delete(year);
    } else {
      newExpanded.add(year);
    }
    setExpandedYears(newExpanded);
  };

  const updateYearlyExpenseInDashboard = (year, categoryId, monthlyAmount) => {
    setYearlyExpenseOverrides(prev => ({
      ...prev,
      [year]: {
        ...(prev[year] || {}),
        [categoryId]: monthlyAmount
      }
    }));
  };

  const updateYearlyAssetWithdrawal = (year, assetId, amount) => {
    setYearlyAssetWithdrawalOverrides(prev => ({
      ...prev,
      [year]: {
        ...(prev[year] || {}),
        [assetId]: amount
      }
    }));
  };

  const getLaborIncomeForYear = (year, yearOffset) => {
    if (yearlyLaborIncomeOverrides[year] !== undefined) {
      return yearlyLaborIncomeOverrides[year] * 12;
    }
    return initialParams.monthlyLaborIncome * 12 * Math.pow(1 + initialParams.laborIncomeGrowth / 100, yearOffset);
  };

  const addExpense = () => {
    setBaseExpenses(prev => [...prev, { 
      id: Date.now(), 
      category: 'New Category', 
      monthlyAmount: 1000,
      growthRate: 0,
      min: 0,
      max: 10000
    }]);
  };

  const updateBaseExpense = (id, field, value) => {
    setBaseExpenses(prev => prev.map(exp => 
      exp.id === id ? { ...exp, [field]: value } : exp
    ));
  };

  const deleteExpense = (id) => {
    setBaseExpenses(prev => prev.filter(exp => exp.id !== id));
    setYearlyExpenseOverrides(prev => {
      const newOverrides = { ...prev };
      Object.keys(newOverrides).forEach(year => {
        delete newOverrides[year][id];
      });
      return newOverrides;
    });
  };

  const getExpensesForYear = (year) => {
    const yearOffset = year - initialParams.currentYear;
    return baseExpenses.map(exp => {
      // If there's an override for this year, use it
      const override = yearlyExpenseOverrides[year]?.find(e => e.categoryId === exp.id);
      if (override !== undefined) {
        return {
          ...exp,
          monthlyAmount: override.monthlyAmount
        };
      }
      // Otherwise apply growth rate and round to whole number
      const growthMultiplier = Math.pow(1 + (exp.growthRate || 0) / 100, yearOffset);
      return {
        ...exp,
        monthlyAmount: Math.round(exp.monthlyAmount * growthMultiplier)
      };
    });
  };

  const resetYearExpenses = (year) => {
    setYearlyExpenseOverrides(prev => {
      const newOverrides = { ...prev };
      delete newOverrides[year];
      return newOverrides;
    });
  };

  const addAsset = () => {
    setAssets(prev => [...prev, {
      id: Date.now(),
      name: 'New Asset',
      balance: 0,
      initialBalance: 0,
      annualReturn: 5,
      taxRate: 25,
      accessible: true,
      withdrawalAge: 0,
      withdrawLimit: null,
    }]);
  };

  const updateAsset = (id, field, value) => {
    setAssets(prev => prev.map(asset => {
      if (asset.id === id) {
        // When balance is updated, also update initialBalance
        if (field === 'balance') {
          return { ...asset, balance: value, initialBalance: value };
        }
        return { ...asset, [field]: value };
      }
      return asset;
    }));
  };

  const deleteAsset = (id) => {
    setAssets(prev => prev.filter(asset => asset.id !== id));
  };

  const calculateOptimalWithdrawal = (yearlyShortfall, availableAssets, age) => {
    // Strategy: withdraw from HIGH-tax accounts first to preserve low-tax wealth longer
    const withdrawalPlan = {};
    let remaining = yearlyShortfall;

    const accessibleAssets = availableAssets
      .map((asset, idx) => ({ ...asset, idx }))
      .filter(a => a.accessible && age >= a.withdrawalAge && a.balance > 0)
      .sort((a, b) => {
        // 1. HIGH tax first (preserve low-tax accounts)
        if (b.taxRate !== a.taxRate) return b.taxRate - a.taxRate;
        // 2. LOW return first (preserve high-growth accounts)
        if (a.annualReturn !== b.annualReturn) return a.annualReturn - b.annualReturn;
        // 3. HIGH INITIAL balance first (use larger accounts completely before smaller ones)
        //    Use initialBalance for stable sort - doesn't change year-to-year
        if (b.initialBalance !== a.initialBalance) return b.initialBalance - a.initialBalance;
        // 4. Stable tiebreaker by ID
        return a.id - b.id;
      });

    for (const asset of accessibleAssets) {
      if (remaining <= 0) break;
      
      const grossNeeded = asset.taxRate < 100
        ? remaining / (1 - asset.taxRate / 100)
        : remaining;
      
      // Apply withdrawal limit if set
      let maxWithdrawal = asset.balance;
      if (asset.withdrawLimit !== null && asset.withdrawLimit !== undefined) {
        const limitAmount = asset.balance * (asset.withdrawLimit / 100);
        maxWithdrawal = Math.min(maxWithdrawal, limitAmount);
      }
      
      const actualWithdrawal = Math.min(grossNeeded, maxWithdrawal);
      withdrawalPlan[asset.name] = actualWithdrawal;
      remaining -= actualWithdrawal * (1 - asset.taxRate / 100);
    }

    return { withdrawalPlan, remainingShortfall: Math.max(0, remaining) };
  };

  const projectionData = useMemo(() => {
    // PASS 1: Find FI year - only if calculateFI is enabled
    let fiYear = null;
    
    if (calculateFI) {
      fiYear = manualFIYear; // Use manual override if set
      let bestCandidate = null;
      let bestFinalBalanceDiff = Infinity;
      let testBalances = assets.map(a => ({ ...a }));
      
      // Only auto-calculate if manual FI year is not set
      if (manualFIYear === null) {
    
    for (let testYearOffset = 0; testYearOffset <= timeHorizon; testYearOffset++) {
      const testCurrentYear = initialParams.currentYear + testYearOffset;
      const testAge = currentAge + testYearOffset;
      
      // Apply returns
      testBalances = testBalances.map(asset => ({
        ...asset,
        balance: asset.balance * (1 + asset.annualReturn / 100)
      }));
      
      // Before checking if we can reach FI from here, simulate what happens with labor income
      const growthMultiplier = Math.pow(1 + initialParams.laborIncomeGrowth / 100, testYearOffset);
      let testCurrentLabor;
      if (yearlyLaborIncomeOverrides[testCurrentYear] !== undefined) {
        testCurrentLabor = yearlyLaborIncomeOverrides[testCurrentYear] * 12; // Override is monthly, multiply by 12
      } else {
        testCurrentLabor = initialParams.currentLaborIncome * growthMultiplier * 12; // Already net
      }
      
      const testExpenses = getExpensesForYear(testCurrentYear);
      const testAnnualExpenses = testExpenses.reduce((sum, exp) => sum + exp.monthlyAmount * 12, 0);
      
      // Calculate debt payments for test year
      let testDebtPayments = 0;
      const monthsElapsed = testYearOffset * 12;
      const testActiveLoans = loans.filter(l => l.remainingMonths > monthsElapsed);
      const testActiveMortgages = mortgages.filter(m => m.remainingMonths > monthsElapsed);
      testActiveLoans.forEach(loan => {
        testDebtPayments += loan.monthlyPayment * 12;
      });
      testActiveMortgages.forEach(mortgage => {
        testDebtPayments += mortgage.monthlyPayment * 12;
      });
      const testTotalObligations = testAnnualExpenses + testDebtPayments;
      
      let testAllowanceIncome = 0;
      allowances.forEach(a => {
        if (testAge >= a.minAge && testAge <= a.maxAge) {
          testAllowanceIncome += a.monthlyIncome * 12 * (1 - a.taxRate / 100);
        }
      });
      
      // If current labor doesn't cover obligations, withdraw the shortfall
      const shortfallWithCurrent = Math.max(0, testTotalObligations - testAllowanceIncome - testCurrentLabor);
      if (shortfallWithCurrent > 0) {
        const { withdrawalPlan } = calculateOptimalWithdrawal(
          shortfallWithCurrent,
          testBalances,
          testAge
        );
        
        for (const [assetName, amount] of Object.entries(withdrawalPlan)) {
          const assetIdx = testBalances.findIndex(a => a.name === assetName);
          if (assetIdx !== -1) {
            testBalances[assetIdx].balance -= amount;
          }
        }
      }
      
      // Now check if from THIS year forward, we can sustain with target labor + withdrawals
      let canSustainFromHere = true;
      let simulatedBalances = testBalances.map(a => ({ ...a }));
      
      for (let futureOffset = testYearOffset; futureOffset <= timeHorizon; futureOffset++) {
        const futureYear = initialParams.currentYear + futureOffset;
        const futureAge = currentAge + futureOffset;
        
        const futureExpenses = getExpensesForYear(futureYear);
        const futureAnnualExpenses = futureExpenses.reduce((sum, exp) => sum + exp.monthlyAmount * 12, 0);
        
        // Calculate debt payments for future year
        let futureDebtPayments = 0;
        const futureMonthsElapsed = futureOffset * 12;
        const futureActiveLoans = loans.filter(l => l.remainingMonths > futureMonthsElapsed);
        const futureActiveMortgages = mortgages.filter(m => m.remainingMonths > futureMonthsElapsed);
        futureActiveLoans.forEach(loan => {
          futureDebtPayments += loan.monthlyPayment * 12;
        });
        futureActiveMortgages.forEach(mortgage => {
          futureDebtPayments += mortgage.monthlyPayment * 12;
        });
        const futureTotalObligations = futureAnnualExpenses + futureDebtPayments;
        
        let futureAllowanceIncome = 0;
        allowances.forEach(a => {
          if (futureAge >= a.minAge && futureAge <= a.maxAge) {
            futureAllowanceIncome += a.monthlyIncome * 12 * (1 - a.taxRate / 100);
          }
        });
        
        const targetNetLabor = initialParams.targetLaborIncome * 12; // Already net
        
        const futureShortfall = Math.max(0, futureTotalObligations - futureAllowanceIncome - targetNetLabor);
        
        if (futureShortfall > 0) {
          const { withdrawalPlan, remainingShortfall } = calculateOptimalWithdrawal(
            futureShortfall,
            simulatedBalances,
            futureAge
          );
          
          if (remainingShortfall > 100) {
            canSustainFromHere = false;
            break;
          }
          
          for (const [assetName, amount] of Object.entries(withdrawalPlan)) {
            const assetIdx = simulatedBalances.findIndex(a => a.name === assetName);
            if (assetIdx !== -1) {
              simulatedBalances[assetIdx].balance -= amount;
            }
          }
        }
        
        if (futureOffset < timeHorizon) {
          simulatedBalances = simulatedBalances.map(asset => ({
            ...asset,
            balance: asset.balance * (1 + asset.annualReturn / 100)
          }));
        }
      }
      
      // Check if we can sustain AND track how close we get to target final balance
      if (canSustainFromHere) {
        const finalBalance = simulatedBalances.reduce((sum, a) => sum + a.balance, 0);
        const balanceDiff = Math.abs(finalBalance - targetFinalBalance);
        
        console.log(`Year ${testCurrentYear}: Sustainable ✓ | Final: ₪${Math.round(finalBalance).toLocaleString()} | Target: ₪${targetFinalBalance.toLocaleString()} | Diff: ₪${Math.round(balanceDiff).toLocaleString()}`);
        
        // Track the best candidate (closest to target final balance)
        if (balanceDiff < bestFinalBalanceDiff) {
          bestFinalBalanceDiff = balanceDiff;
          bestCandidate = testCurrentYear;
          console.log(`  → New best candidate! (diff: ₪${Math.round(balanceDiff).toLocaleString()})`);
        }
        
        // Continue searching all years to find the absolute best match
        // Don't break early - we want to find the year CLOSEST to target
      }
    }
    
    // Use the best candidate we found (closest to target final balance)
    if (bestCandidate !== null) {
      fiYear = bestCandidate;
      console.log(`FI Year Selected: ${fiYear} | Final Balance Diff: ₪${Math.round(bestFinalBalanceDiff).toLocaleString()}`);
    }
    } else {
      console.log(`Using Manual FI Year Override: ${manualFIYear}`);
    }
    } // End of calculateFI check
    
    // PASS 2: Now do the actual projection with the FI year known (or null if calculateFI=false)
    const data = [];
    let assetBalances = assets.map(a => ({ ...a }));
    
    for (let year = 0; year <= timeHorizon; year++) {
      const currentYear = initialParams.currentYear + year;
      const age = currentAge + year;
      
      const yearExpenses = getExpensesForYear(currentYear);
      const annualExpenses = yearExpenses.reduce((sum, exp) => sum + exp.monthlyAmount * 12, 0);
      
      // Calculate debt payments for this year (separated)
      let annualMortgagePayments = 0;
      let annualLoanPayments = 0;
      const monthsElapsed = year * 12;
      const activeLoans = loans.filter(l => l.remainingMonths > monthsElapsed);
      const activeMortgages = mortgages.filter(m => m.remainingMonths > monthsElapsed);
      activeLoans.forEach(loan => {
        annualLoanPayments += loan.monthlyPayment * 12;
      });
      activeMortgages.forEach(mortgage => {
        annualMortgagePayments += mortgage.monthlyPayment * 12;
      });
      const annualDebtPayments = annualMortgagePayments + annualLoanPayments;
      
      // Total obligations = expenses + debt payments
      const totalObligations = annualExpenses + annualDebtPayments;
      
      // Apply investment returns to all assets
      assetBalances = assetBalances.map(asset => {
        const returnAmount = asset.balance * (asset.annualReturn / 100);
        return {
          ...asset,
          balance: asset.balance + returnAmount
        };
      });

      // Fix incomes (allowances) active this year
      const allowanceDetails = {};
      let annualAllowanceIncome = 0;
      let allowanceTaxesPaid = 0;
      
      allowances.forEach(a => {
        const active = age >= a.minAge && age <= a.maxAge;
        if (active) {
          const grossAnnual = a.monthlyIncome * 12;
          const afterTax = grossAnnual * (1 - a.taxRate / 100);
          const tax = grossAnnual * (a.taxRate / 100);
          allowanceDetails[a.id] = { afterTax, tax };
          annualAllowanceIncome += afterTax;
          allowanceTaxesPaid += tax;
        } else {
          allowanceDetails[a.id] = { afterTax: 0, tax: 0 };
        }
      });

      // Calculate current labor income from all active salaries
      let currentAnnualLabor = 0;
      salaries.forEach(salary => {
        // Check if salary is active at this age (age is already calculated above)
        if (age >= salary.minAge && age <= salary.maxAge) {
          const growthMultiplier = Math.pow(1 + salary.growthRate / 100, year);
          const monthlySalary = salary.monthlyIncome * growthMultiplier;
          currentAnnualLabor += monthlySalary * 12;
        }
      });
      
      const targetAnnualLabor = initialParams.targetLaborIncome * 12; // Already net

      let totalTaxesPaid = allowanceTaxesPaid;
      let capitalGainsTax = 0; // Track capital gains tax separately
      const withdrawalsByAsset = {};
      let assetWithdrawalTotal = 0;
      let actualLaborIncome = 0;
      let reachedFI = false;

      // Check if user overrode labor income for this year
      const hasLaborOverride = yearlyLaborIncomeOverrides[currentYear] !== undefined;

      if (hasLaborOverride) {
        // USER OVERRIDE: Use specified labor income (stored as monthly, so multiply by 12), withdraw to cover gap (only if FI enabled)
        actualLaborIncome = yearlyLaborIncomeOverrides[currentYear] * 12;
        const shortfallAfterLabor = Math.max(0, totalObligations - annualAllowanceIncome - actualLaborIncome);

        if (calculateFI && shortfallAfterLabor > 0) {
          const { withdrawalPlan } = calculateOptimalWithdrawal(
            shortfallAfterLabor,
            assetBalances,
            age
          );

          for (const [assetName, amount] of Object.entries(withdrawalPlan)) {
            const assetIdx = assetBalances.findIndex(a => a.name === assetName);
            if (assetIdx !== -1) {
              const asset = assetBalances[assetIdx];
              const tax = amount * (asset.taxRate / 100);
              capitalGainsTax += tax; // Track as capital gains
              totalTaxesPaid += tax;
              assetBalances[assetIdx].balance -= amount;
              withdrawalsByAsset[assetName] = amount;
              assetWithdrawalTotal += amount * (1 - asset.taxRate / 100);
            }
          }
        }
        reachedFI = calculateFI && fiYear !== null && currentYear >= fiYear;
      } else {
        // AUTO CALCULATE: Use FI year from Pass 1 (only if FI enabled)
        if (calculateFI && fiYear !== null && currentYear >= fiYear) {
          // AT OR AFTER FI: Use target labor + withdrawals
          reachedFI = true;
          actualLaborIncome = targetAnnualLabor;
          
          const shortfallWithTarget = Math.max(0, totalObligations - annualAllowanceIncome - targetAnnualLabor);
          
          if (shortfallWithTarget > 0) {
            const { withdrawalPlan } = calculateOptimalWithdrawal(
              shortfallWithTarget,
              assetBalances,
              age
            );

            for (const [assetName, amount] of Object.entries(withdrawalPlan)) {
              const assetIdx = assetBalances.findIndex(a => a.name === assetName);
              if (assetIdx !== -1) {
                const asset = assetBalances[assetIdx];
                const tax = amount * (asset.taxRate / 100);
                capitalGainsTax += tax; // Track as capital gains
                totalTaxesPaid += tax;
                assetBalances[assetIdx].balance -= amount;
                withdrawalsByAsset[assetName] = amount;
                assetWithdrawalTotal += amount * (1 - asset.taxRate / 100);
              }
            }
          }
        } else if (calculateFI) {
          // BEFORE FI (only if FI enabled): Use current labor, withdraw if needed to cover expenses
          reachedFI = false;
          actualLaborIncome = currentAnnualLabor;
          
          const shortfallWithCurrent = Math.max(0, totalObligations - annualAllowanceIncome - currentAnnualLabor);
          
          if (shortfallWithCurrent > 0) {
            // Current labor doesn't cover expenses - need to withdraw
            const { withdrawalPlan } = calculateOptimalWithdrawal(
              shortfallWithCurrent,
              assetBalances,
              age
            );

            for (const [assetName, amount] of Object.entries(withdrawalPlan)) {
              const assetIdx = assetBalances.findIndex(a => a.name === assetName);
              if (assetIdx !== -1) {
                const asset = assetBalances[assetIdx];
                const tax = amount * (asset.taxRate / 100);
                capitalGainsTax += tax; // Track as capital gains
                totalTaxesPaid += tax;
                assetBalances[assetIdx].balance -= amount;
                withdrawalsByAsset[assetName] = amount;
                assetWithdrawalTotal += amount * (1 - asset.taxRate / 100);
              }
            }
          }
        } else {
          // FI NOT ENABLED: Just use current labor, no withdrawals
          reachedFI = false;
          actualLaborIncome = currentAnnualLabor;
          // No withdrawals - let shortfall exist
        }
      }
      
      const totalWealth = assetBalances.reduce((sum, a) => sum + a.balance, 0);

      const dataPoint = {
        year: currentYear,
        age: age,
        yearOffset: year,
        expenses: annualExpenses,
        debtPayments: annualDebtPayments,
        mortgagePayments: annualMortgagePayments,
        loanPayments: annualLoanPayments,
        totalObligations: totalObligations,
        expensesByCategory: yearExpenses,
        assetIncome: Math.round(assetWithdrawalTotal),
        laborIncome: Math.round(actualLaborIncome),
        allowanceIncome: Math.round(annualAllowanceIncome),
        totalIncome: Math.round(assetWithdrawalTotal + actualLaborIncome + annualAllowanceIncome),
        totalWealth: Math.round(totalWealth),
        totalTaxes: Math.round(capitalGainsTax), // Only capital gains tax now
        laborTax: 0, // No labor tax tracking
        capitalGainsTax: Math.round(capitalGainsTax),
        hasCustomExpenses: !!yearlyExpenseOverrides[currentYear],
        hasCustomLaborIncome: hasLaborOverride,
        assetBalances: assetBalances.map(a => ({...a})),
        withdrawalsByAsset,
        reachedFI: reachedFI,
        _debugAssetSum: 0,
      };
      
      // CRITICAL: Set withdrawal to 0 for ALL assets first, then override with actual values
      assets.forEach(asset => {
        dataPoint[`${asset.name}_withdrawal`] = 0;
        dataPoint[`${asset.name}_tax`] = 0; // Initialize tax per asset
      });
      
      assetBalances.forEach(asset => {
        dataPoint[`${asset.name}_balance`] = Math.round(asset.balance);
        const grossWithdrawal = withdrawalsByAsset[asset.name] || 0;
        const afterTaxWithdrawal = grossWithdrawal * (1 - asset.taxRate / 100);
        const taxPaid = grossWithdrawal * (asset.taxRate / 100);
        dataPoint[`${asset.name}_withdrawal`] = Math.round(afterTaxWithdrawal);
        dataPoint[`${asset.name}_tax`] = Math.round(taxPaid); // Store tax per asset
        dataPoint._debugAssetSum += Math.round(afterTaxWithdrawal);
      });

      // Per-allowance after-tax income this year (use pre-calculated values)
      dataPoint._debugAllowanceSum = 0;
      allowances.forEach(a => {
        const amount = Math.round(allowanceDetails[a.id]?.afterTax || 0);
        dataPoint[`allowance_${a.id}`] = amount;
        dataPoint._debugAllowanceSum += amount;
      });
      
      // Per-expense amounts for stacked chart
      yearExpenses.forEach(exp => {
        dataPoint[`expense_${exp.id}`] = Math.round(exp.monthlyAmount * 12);
      });
      
      // Debug verification: sum of stacked areas should equal totalIncome
      const stackedSum = dataPoint._debugAssetSum + dataPoint.laborIncome + dataPoint._debugAllowanceSum;
      if (Math.abs(stackedSum - dataPoint.totalIncome) > 1) {
        console.warn(`Year ${currentYear}: Stacked sum (${stackedSum}) != totalIncome (${dataPoint.totalIncome})`);
      }
      
      data.push(dataPoint);
    }
    
    return data;
  }, [initialParams, baseExpenses, yearlyExpenseOverrides, yearlyLaborIncomeOverrides, assets, allowances, salaries, loans, mortgages, timeHorizon, currentAge, targetFinalBalance, manualFIYear, calculateFI]);

        mortgages.forEach(m => {

            // Simple approximation: remaining balance decreases linearly
            const remainingRatio = (m.remainingMonths - monthsElapsed) / m.remainingMonths;
            totalMortgageBalance += m.balance * remainingRatio;

        loans.forEach(l => {

            const remainingRatio = (l.remainingMonths - monthsElapsed) / l.remainingMonths;
            totalLoanBalance += l.balance * remainingRatio;
          }
        });
        
        dataPoint.totalBalance = totalMortgageBalance + totalLoanBalance;
        dataPoint.mortgageBalance = totalMortgageBalance;
        dataPoint.loanBalance = totalLoanBalance;

      const pdf = new jsPDF('p', 'mm', 'a4');
      const pageWidth = 210;
      const pageHeight = 297;
      const margin = 8;
      const contentWidth = pageWidth - margin * 2;

      const sectionsToExport = [];
      if (selections.dashboard) sectionsToExport.push('dashboard');
      if (selections.expenses) sectionsToExport.push('expenses');
      if (selections.incomes) sectionsToExport.push('incomes');
      if (selections.assets) sectionsToExport.push('assets');
      if (selections.debts) sectionsToExport.push('debts');

      let firstPage = true;

      for (const sectionView of sectionsToExport) {
        setView(sectionView);
        // Wait for React render + Recharts SVG paint
        await new Promise(resolve => setTimeout(resolve, 900));

        const inputs = Array.from(contentEl.querySelectorAll('input, textarea'));

          const div = document.createElement('div');

          div.style.background = cs.backgroundColor;
          div.style.border = cs.border;
          div.style.borderRadius = cs.borderRadius;
          div.style.width = cs.width;
          div.style.height = cs.height;
          div.style.minWidth = cs.minWidth;
          div.style.padding = '0 4px';
          div.style.boxSizing = 'border-box';
          div.style.overflow = 'visible';
          div.className = input.className;
          input.parentNode.replaceChild(div, input);
          return { div, input };
        });

        // Step 2: Fix legend alignment in the real DOM temporarily
        const legendStyle = document.createElement('style');
        legendStyle.id = '__pdf-legend-fix';
        legendStyle.textContent = `
          .recharts-legend-item {
            display: inline-flex !important;
            align-items: center !important;
            gap: 4px !important;
            margin-right: 12px !important;
          }
          .recharts-legend-item svg { vertical-align: middle !important; flex-shrink: 0 !important; }
          .recharts-legend-item-text { vertical-align: middle !important; line-height: 1 !important; }
        `;
        document.head.appendChild(legendStyle);

        // Step 3: Screenshot using real window dimensions so ResponsiveContainer renders correctly
        const canvas = await html2canvas(contentEl, {
          scale: 1.5,
          useCORS: true,
          allowTaint: true,
          logging: false,
          backgroundColor: '#f9fafb',
          width: contentEl.scrollWidth,
          height: contentEl.scrollHeight,
          windowWidth: window.innerWidth,
          windowHeight: window.innerHeight,
          scrollX: 0,
          scrollY: 0,
        });

        // Step 4: Restore real DOM
        swaps.forEach(({ div, input }) => div.parentNode.replaceChild(input, div));
        document.getElementById('__pdf-legend-fix')?.remove();

        const pxPerMm = canvas.width / contentWidth;
        const pageHeightPx = (pageHeight - margin * 2) * pxPerMm;

        let yOffset = 0;
        while (yOffset < canvas.height) {
          if (!firstPage) pdf.addPage();
          firstPage = false;

          const slicePx = Math.min(pageHeightPx, canvas.height - yOffset);
          const sliceCanvas = document.createElement('canvas');
          sliceCanvas.width = canvas.width;
          sliceCanvas.height = slicePx;
          sliceCanvas.getContext('2d').drawImage(
            canvas, 0, yOffset, canvas.width, slicePx, 0, 0, canvas.width, slicePx
          );

          const sliceHeightMm = (slicePx / pxPerMm);
          pdf.addImage(sliceCanvas.toDataURL('image/png'), 'PNG', margin, margin, contentWidth, sliceHeightMm);
          yOffset += pageHeightPx;
        }

`;

</body>
</html>

      link.setAttribute('download', `financial-plan-${new Date().toISOString().split('T')[0]}.html`);
      link.style.visibility = 'hidden';

      document.body.removeChild(link);

                    <div className="bg-white p-3 rounded-lg shadow-lg border-2 text-center" style={{ borderColor: item.fill }}>
                      <p className="font-bold text-gray-900 mb-1">{item.name}</p>
                      <p className="text-sm text-gray-600 mb-3">{label}</p>
                      <div className="space-y-1">
                        <div className="text-lg font-bold text-gray-900">
                          {formatCurrency(monthlyValue)} <span className="text-xs text-gray-500 font-normal">/mo</span>
                        </div>
                        <div className="text-lg font-bold text-gray-900">
                          {formatCurrency(item.value)} <span className="text-xs text-gray-500 font-normal">/yr</span>
                        </div>
                      </div>
                      <p className="text-xs text-blue-600 mt-3 font-semibold">Click to edit</p>
                    </div>
                  );
                }}
              />
              {baseExpenses.map((expense, idx) => {
                const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ef4444', '#06b6d4', '#6366f1', '#ec4899', '#14b8a6', '#f97316', '#a855f7', '#22c55e'];
                return (
                  <Bar
                    key={`${expense.id}-${chartKey}`}
                    dataKey={`expense_${expense.id}`}
                    stackId="expenses"
                    fill={COLORS[idx % COLORS.length]}
                    name={expense.category}
                    cursor="pointer"
                    onMouseEnter={() => setHoveredSegment({ expenseId: expense.id, categoryName: expense.category })}
                    onMouseLeave={() => setHoveredSegment(null)}
                    onClick={(data) => {
                      if (data && data.year) {
                        setEditPopup({
                          year: data.year,
                          expenseId: expense.id,
                          categoryName: expense.category
                        });
                      }
                    }}
                  />
                );
              })}
            </BarChart>
          </ResponsiveContainer>

          {/* Quick Edit Popup */}
          {editPopup && (
            <ExpenseEditPopup
              editPopup={editPopup}
              setEditPopup={setEditPopup}
              baseExpenses={baseExpenses}
              yearlyExpenseOverrides={yearlyExpenseOverrides}
              setYearlyExpenseOverrides={setYearlyExpenseOverrides}
              formatCurrency={formatCurrency}
              refreshChart={() => setChartKey(prev => prev + 1)}
            />
          )}
        </div>
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 p-4 md:p-8">
      <div className="max-w-7xl mx-auto relative">
        {/* Navigation Grid */}
        <div className="mb-8 mx-auto relative">
          {/* Export Button - positioned to the right of Incomes button */}
          {view && (
            <div className="absolute top-0 right-0 transform translate-x-full pl-4 z-30">
              <button
                onClick={() => setShowExportPopup(true)}
                className="px-2 py-1.5 bg-gray-100 text-gray-600 rounded-md text-base font-normal shadow-sm hover:bg-gray-200 transition-all border border-gray-300"
              >
                📥
              </button>
            </div>
          )}
          
          <div className="grid grid-cols-2 gap-4">
            {/* Top row */}
            <button
              onClick={() => setView('expenses')}
              className={`px-8 py-12 rounded-xl font-semibold text-lg transition-all ${
                view === 'expenses' 
                  ? 'bg-red-500 text-white shadow-lg' 
                  : 'bg-red-50 text-red-700 hover:bg-red-100 border-2 border-red-200 hover:border-red-300'
              }`}
            >
              Expenses
            </button>
            <button
              onClick={() => setView('incomes')}
              className={`px-8 py-12 rounded-xl font-semibold text-lg transition-all ${
                view === 'incomes' 
                  ? 'bg-blue-500 text-white shadow-lg' 
                  : 'bg-blue-50 text-blue-700 hover:bg-blue-100 border-2 border-blue-200 hover:border-blue-300'
              }`}
            >
              Incomes
            </button>
            
            {/* Bottom row */}
            <button
              onClick={() => setView('debts')}
              className={`px-8 py-12 rounded-xl font-semibold text-lg transition-all ${
                view === 'debts' 
                  ? 'bg-orange-500 text-white shadow-lg' 
                  : 'bg-orange-50 text-orange-700 hover:bg-orange-100 border-2 border-orange-200 hover:border-orange-300'
              }`}
            >
              Debts
            </button>
            <button
              onClick={() => setView('assets')}
              className={`px-8 py-12 rounded-xl font-semibold text-lg transition-all ${
                view === 'assets' 
                  ? 'bg-emerald-500 text-white shadow-lg' 
                  : 'bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border-2 border-emerald-200 hover:border-emerald-300'
              }`}
            >
              Assets
            </button>
          </div>
          
          {/* Financial Plan - Larger to match grid buttons on full screen */}
          <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
            <button
              onClick={() => setView('dashboard')}
              className={`w-96 px-8 py-12 rounded-xl font-semibold text-lg transition-all flex items-center justify-center ${
                view === 'dashboard' 
                  ? 'bg-gradient-to-br from-purple-500 to-purple-600 text-white shadow-2xl' 
                  : 'bg-gradient-to-br from-purple-50 to-purple-100 text-purple-700 hover:from-purple-100 hover:to-purple-200 border-4 border-white shadow-xl hover:scale-105'
              }`}
              style={{ zIndex: 10 }}
            >
              <span className="text-center leading-tight">Financial Plan</span>
            </button>
          </div>
        </div>

        <div id="export-content">
          {view === 'dashboard' && <DashboardView />}
          {view === 'expenses' && <ExpensesView />}
          {view === 'incomes' && <IncomesView />}
          {view === 'assets' && <AssetsView />}
          {view === 'debts' && <DebtsView />}
        </div>

        {/* Loading overlay during export */}
        {isExporting && (
          <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:9999}}>
            <div style={{background:'white',padding:'2rem 3rem',borderRadius:'1rem',textAlign:'center',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
              <div style={{fontSize:'1.2rem',fontWeight:600,marginBottom:'0.5rem'}}>Exporting PDF…</div>
              <div style={{color:'#666',fontSize:'0.9rem'}}>Capturing each section, please wait</div>
            </div>
          </div>
        )}

        {/* Export Popup */}
        <ExportPopup />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<FinancialPlanner />);
    </script>
</body>
</html>
